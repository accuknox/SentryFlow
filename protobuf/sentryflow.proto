syntax = "proto3";

package protobuf;

option go_package = "github.com/accuknox/SentryFlow/protobuf/golang";

message ClientInfo {
  string hostName = 1;
  string IPAddress = 2;
}

message APILog {
  option deprecated = true;

  uint64 id = 1;
  string timeStamp = 2;

  string srcNamespace = 11;
  string srcName = 12;
  map<string, string> srcLabel = 13;

  string srcType = 21;
  string srcIP = 22;
  string srcPort = 23;

  string dstNamespace = 31;
  string dstName = 32;
  map<string, string> dstLabel = 33;

  string dstType = 41;
  string dstIP = 42;
  string dstPort = 43;

  string protocol = 51;
  string method = 52;
  string path = 53;
  int32 responseCode = 54;
}

message APIEvent {
  Metadata metadata = 1;

  Workload source = 3;
  Workload destination = 4;
  Request request = 5;
  Response response = 6;
  string protocol = 7;
  uint64 latency_ns = 8; 
}

message Metadata {
  uint32 context_id = 1;
  uint64 timestamp = 2;
  string istio_version = 3 [deprecated = true];
  string mesh_id = 4;
  string node_name = 5;
  string receiver_name = 6;
  string receiver_version = 7;
}

message Workload {
  string name = 1;
  string namespace = 2;
  string ip = 3;
  int32 port = 4;
  map<string, string> labels = 5; // K8s labels for policy matching
  string kind = 6; // "Pod" | "Service" | "External"
}

message Request {
  map<string, string> headers = 1;
  string body = 2;
  string method = 3; // GET/POST/gRPC method name
  string path = 4; // URL path or gRPC full method path
}

message Response {
  map<string, string> headers = 1;
  string body = 2;
  uint64 backend_latency_in_nanos = 3;
  int32 status_code = 4; // HTTP/gRPC status code
}

message APIMetrics {
  map<string, uint64> perAPICounts = 1;
}

message MetricValue {
  map<string, string> value = 1;
}

message EnvoyMetrics {
  string timeStamp = 1;

  string namespace = 11;
  string name = 12;
  string IPAddress = 13;
  map<string, string> labels = 14;

  map<string, MetricValue> metrics = 21;
}

message APIEventFilter {
  string namespace = 1;
  string pod_name = 2;
  repeated string protocols = 3;
  repeated string methods = 4;
  repeated string status_patterns = 5;
  int64 min_duration_ms = 6;
}

message MetricsRequest {
  int64 time_range_seconds = 1;
}

message EndpointMetric {
  string method = 1;
  string path = 2;
  uint64 request_count = 3;
  double avg_latency_ms = 4;
  double p95_latency_ms = 5;
  double p99_latency_ms = 6;
}

message APIObserverMetrics {
  uint64 timestamp = 1;
  uint64 total_events = 2;
  map<string, uint64> events_by_protocol = 3;
  map<string, uint64> events_by_status = 4;
  repeated EndpointMetric top_endpoints = 5;
  map<string, double> avg_latency_by_endpoint = 6;
  double error_rate = 7;
}

service SentryFlow {
  rpc GetAPILog(ClientInfo) returns (stream APILog) {
    option deprecated = true;
  }
  rpc GetAPIEvent(ClientInfo) returns (stream APIEvent);
  rpc SendAPIEvent(APIEvent) returns (APIEvent);
  rpc GetAPIMetrics(ClientInfo) returns (stream APIMetrics);
  rpc GetEnvoyMetrics(ClientInfo) returns (stream EnvoyMetrics);
}

// Service for kubearmor — does not touch the SentryFlow service above.
service APIObserverService {
  rpc GetAPIEvents(APIEventFilter) returns (stream APIEvent);
  rpc GetAPIMetrics(MetricsRequest) returns (APIObserverMetrics);
}
